# =============================================================================
# TIME - Home Assistant time source and timezone setting
# =============================================================================
# HA time drives the on-screen clock. The timezone setting provides
# approximate lat/lon for on-device sunrise/sunset calculation (sun_calc.h).
# =============================================================================

esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          const char *posix = apply_timezone(id(timezone_select).state);
          id(ha_time).set_timezone(posix);

# ---------------------------------------------------------------------------
# Timezone setting (drives sunrise/sunset calculation via sun_calc.h)
# ---------------------------------------------------------------------------
text:
  - platform: template
    name: "Screen: Timezone"
    internal: true
    disabled_by_default: true
    id: timezone_select
    entity_category: config
    icon: "mdi:map-clock"
    optimistic: true
    restore_value: true
    initial_value: "UTC (GMT+0)"
    min_length: 3
    max_length: 64
    mode: text
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - lambda: |-
            const char *posix = apply_timezone(id(timezone_select).state);
            id(ha_time).set_timezone(posix);
        - script.execute: time_update
        - script.execute: backlight_recalc_sunrise_sunset
        - script.execute: screen_schedule_check

select:
  - platform: template
    name: "Screen: Clock Format"
    internal: true
    disabled_by_default: true
    id: clock_format_select
    entity_category: config
    icon: "mdi:clock-outline"
    optimistic: true
    restore_value: true
    initial_option: "24h"
    options:
      - "12h"
      - "24h"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: time_update
        - script.execute: backlight_recalc_sunrise_sunset

# ---------------------------------------------------------------------------
# Date source for Date cards
# ---------------------------------------------------------------------------
text_sensor:
  # Diagnostic value published from the Home Assistant time source. This makes
  # the date visible as an ESPHome state and gives Date cards a clear source.
  - platform: template
    name: "Screen: Date"
    id: screen_date_sensor
    entity_category: diagnostic
    icon: "mdi:calendar"
    update_interval: never
    web_server:
      sorting_group_id: sg_brightness

  # Optional direct Home Assistant Date & Time integration source. When
  # Home Assistant has sensor.date, use it immediately; otherwise the HA time
  # source below remains the fallback.
  - platform: homeassistant
    id: homeassistant_date_sensor
    entity_id: sensor.date
    internal: true
    on_value:
      then:
        - lambda: |-
            if (update_calendar_cards_from_date_text(x)) {
              id(screen_date_sensor).publish_state(x);
            }

# ---------------------------------------------------------------------------
# HA time source; sync triggers clock and sunrise/sunset recalculation
# ---------------------------------------------------------------------------
time:
  - platform: homeassistant
    id: ha_time
    timezone: "UTC0"
    on_time_sync:
      - script.execute: time_update
      - script.execute: backlight_recalc_sunrise_sunset
      - script.execute: screen_schedule_check
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

script:
  - id: time_update
    then:
      - lambda: |-
          const char *posix = apply_timezone(id(timezone_select).state);
          id(ha_time).set_timezone(posix);
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(ha_time).now();
            if (!now.is_valid()) return "--:--";
            int h = now.hour;
            int m = now.minute;
            bool use_12h =
                id(clock_format_select).current_option() == "12h";
            if (use_12h) {
              int h12 = h % 12;
              if (h12 == 0) h12 = 12;
              snprintf(time_buf, sizeof(time_buf), "%d:%02d", h12, m);
            } else {
              snprintf(time_buf, sizeof(time_buf), "%02d:%02d", h, m);
            }
            return time_buf;
      - lambda: |-
          auto now = id(ha_time).now();
          bool use_12h =
              id(clock_format_select).current_option() == "12h";
          update_timezone_cards(now.is_valid(), now.timestamp, use_12h);
          if (now.is_valid()) {
            static char date_buf[11];
            snprintf(date_buf, sizeof(date_buf), "%04d-%02d-%02d",
                     now.year, now.month, now.day_of_month);
            id(screen_date_sensor).publish_state(date_buf);
            update_calendar_cards(true, now.day_of_month, now.month);
          } else if (!calendar_date_valid()) {
            id(screen_date_sensor).publish_state("");
            update_calendar_cards(false, 0, 0);
          }
