# =============================================================================
# LVGL PAGES - Top-layer HUD, 5 pages of 3x3 button grids, page indicators
# =============================================================================
# Defines the primary UI for the 480x480 square display:
#   - Top layer: temperature + clock labels, page indicator dots
#   - 5 swipeable pages, each with a 3x3 grid of button widgets
#   - Buttons start hidden; sensors.yaml unhides active ones at boot
# =============================================================================

lvgl:
  # ---------------------------------------------------------------------------
  # Top layer (always visible above all pages)
  # ---------------------------------------------------------------------------
  top_layer:
    widgets:
      # Indoor/outdoor temperature (top-left)
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 2
          text_color: 0xFFFFFF
          hidden: true

      # Clock (top-center, updated every minute by time.yaml)
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 2
          text_align: center
          text_color: 0xFFFFFF
          hidden: true

      # Page indicator dots (bottom-center)
      - obj:
          id: page_dots
          align: bottom_mid
          y: -6
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          bg_opa: TRANSP
          border_width: 0
          pad_all: 0
          clickable: false
          hidden: true
          layout:
            type: flex
            flex_flow: row
            flex_align_main: center
            pad_column: 8
          widgets:
            - obj:
                id: dot_1
                width: 8
                height: 8
                radius: 4
                bg_color: 0xFFFFFF
                bg_opa: COVER
                border_width: 0
                clickable: false
            - obj:
                id: dot_2
                width: 8
                height: 8
                radius: 4
                bg_opa: TRANSP
                border_width: 1
                border_color: 0x666666
                clickable: false
            - obj:
                id: dot_3
                width: 8
                height: 8
                radius: 4
                bg_opa: TRANSP
                border_width: 1
                border_color: 0x666666
                clickable: false
            - obj:
                id: dot_4
                width: 8
                height: 8
                radius: 4
                bg_opa: TRANSP
                border_width: 1
                border_color: 0x666666
                clickable: false
            - obj:
                id: dot_5
                width: 8
                height: 8
                radius: 4
                bg_opa: TRANSP
                border_width: 1
                border_color: 0x666666
                clickable: false

  # ---------------------------------------------------------------------------
  # Pages (5 swipeable pages, each a 3x3 grid of button widgets)
  # ---------------------------------------------------------------------------
  pages:
    # =========================================================================
    # Page 1 (buttons 1–9)
    # =========================================================================
    - id: page_1
      layout:
        type: flex
        flex_flow: row_wrap
        pad_row: 8
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 28
      pad_bottom: 24
      pad_left: 5
      pad_right: 5
      widgets:
        - !include { file: button_widget.yaml, vars: { num: "1" } }
        - !include { file: button_widget.yaml, vars: { num: "2" } }
        - !include { file: button_widget.yaml, vars: { num: "3" } }
        - !include { file: button_widget.yaml, vars: { num: "4" } }
        - !include { file: button_widget.yaml, vars: { num: "5" } }
        - !include { file: button_widget.yaml, vars: { num: "6" } }
        - !include { file: button_widget.yaml, vars: { num: "7" } }
        - !include { file: button_widget.yaml, vars: { num: "8" } }
        - !include { file: button_widget.yaml, vars: { num: "9" } }

    # =========================================================================
    # Page 2 (buttons 10–18)
